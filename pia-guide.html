<script>
(function(){
  /* ── 개요 표시 함수 ─────────────────────────────────── */
  window.showPIAOverview = function() {
    window._piaOverviewActive = true;
    // 데이터 항목 active 클래스 제거
    document.querySelectorAll('#piaList .g-item').forEach(function(el){ el.classList.remove('active'); });
    // 개요 항목 active 표시
    var ov = document.getElementById('pia-overview-item');
    if (ov) ov.classList.add('active');
    // 개요 콘텐츠 렌더링
    var tpl = document.getElementById('pia-overview-tpl');
    var el  = document.getElementById('piaContent');
    if (el && tpl) { el.innerHTML = tpl.innerHTML; el.scrollTop = 0; }
  };

  /* ── selectPIAByCode 패치: 개요 active 상태 해제 ────── */
  var _origSel = window.selectPIAByCode;
  if (typeof _origSel === 'function') {
    window.selectPIAByCode = function(code) {
      window._piaOverviewActive = false;
      var ov = document.getElementById('pia-overview-item');
      if (ov) ov.classList.remove('active');
      _origSel(code);
    };
  }

  /* ── 사이드바 초기 렌더링 ─────────────────────────── */
  if (typeof filterPIA === 'function') filterPIA();

  /* ── 기본 표시: 개요 ─────────────────────────────────── */
  showPIAOverview();
})();
</script>
