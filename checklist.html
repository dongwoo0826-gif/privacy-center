<div class="page" id="pg-checklist">
<div class="pg-wrap">
  <div style="margin-bottom:1.5rem">
    <div style="font-size:11px;color:var(--accent);font-family:var(--mono);letter-spacing:.1em;margin-bottom:3px">AI checklist · 2026</div>
    <div style="font-size:1.4rem;font-weight:700;color:var(--text)">AI 활용 시스템 점검 체크리스트</div>
    <div style="font-size:13px;color:var(--text2);margin-top:.25rem">외부 AI 모델을 활용하는 시스템 대상 19개 점검 항목. 행을 클릭하면 질의문·가이드·증빙이 펼쳐집니다.</div>
  </div>
  <div class="xl-controls">
    <input class="xl-search" id="clSearch" placeholder="항목명, 법령, 키워드 검색..." oninput="filterCL()">

    <select class="xl-select" id="clRisk" onchange="filterCL()">
      <option value="">전체 위험도</option>
      <option value="high">높음</option>
      <option value="mid">중간</option>
    </select>
    <span class="xl-count" id="clCount">19개 항목</span>
  </div>
  <div class="xl-wrap">
    <table class="xl-table">
      <thead><tr>
        <th style="width:70px">코드</th>
        <th style="width:100px">분류</th>
        <th>점검항목</th>
        <th style="width:70px">위험도</th>
        <th style="width:200px">관련 법규</th>
        <th style="width:32px"></th>
      </tr></thead>
      <tbody id="clBody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- ══════ ABOUT ══════ -->

<script>
// ══ CHECKLIST ══
const CL=[
  {code:'AI-01',cat:'수집',name:'적법한 처리 근거',risk:'high',law:'개인정보보호법 제15조·제23조·제24조·제28조의2',query:'AI 학습·운영을 위해 개인정보를 수집·이용하는 경우, 명확한 목적과 적법 요건을 확인·준수하고 있습니까?',guide:'수집 출처별 적법 근거(동의·가명처리 등) 보유 여부 확인. AI 학습에 이용된다는 사실을 명확히 고지·동의 필요.',evidence:['수집 출처별 적법 근거 목록','개인정보 수집·이용 동의서']},
  {code:'AI-02',cat:'수집',name:'공개 데이터 필터링',risk:'high',law:'개인정보보호법 제15조 제1항 제6호·제23조·제24조',query:'공개 공간에서 데이터를 수집(스크래핑)할 때, 민감정보나 불법정보가 포함되지 않도록 조치하고 있습니까?',guide:'민감정보·고유식별정보·14세 미만 아동 정보·불법 유통 정보 필터링. robots.txt 준수, 딥웹·다크웹 수집 금지.',evidence:['데이터 수집 리스트 및 출처','필터링 로직(Regex 등)','필터링 검증 결과서']},
  {code:'AI-03',cat:'수집',name:'학습 데이터 최소화',risk:'high',law:'개인정보보호법 제3조·제16조·제28조의2',query:'AI 학습 개인정보에 익명·가명처리를 우선 적용하고, 원본 활용 시 최소 범위로 처리하고 있습니까?',guide:'정규표현식 등으로 개인정보 탐지 후 삭제·치환·마스킹. 프롬프트 입력 내 개인정보 최소화 운영 지침 마련.',evidence:['필터링 로직','데이터 변환 전·후 샘플','프롬프트 입력 가이드라인']},
  {code:'AI-04',cat:'이용',name:'프롬프트 학습 거부권(Opt-out)',risk:'mid',law:'개인정보보호법 제4조·제15조 제3항·제37조',query:'이용자 프롬프트를 AI 학습에 재활용하는 경우, 고지하고 거부(opt-out) 기능을 제공하고 있습니까?',guide:'학습 활용 사실 고지 및 설정 메뉴 내 opt-out 기능 제공. 미제공 시 계약 조항으로 학습 이용 금지 명시.',evidence:['opt-out 설정 화면','학습 활용 고지 문구(동의서)','학습 이용 금지 계약 조항']},
  {code:'AI-05',cat:'이용',name:'처리위탁 계약',risk:'mid',law:'개인정보보호법 제26조',query:'AI 서비스 제공자와 개인정보 처리위탁 계약, DPA가 체결되어 있습니까?',guide:'AI 서비스 도입 시 개인정보 처리가 수반되면 처리위탁 계약 체결 필수. 수탁사 목록을 처리방침에 공개·최신화.',evidence:['처리위탁 계약서·DPA','수탁사 목록']},
  {code:'AI-06',cat:'이용',name:'이용방침(AUP) 검토',risk:'mid',law:'인공지능기본법 제31조 (권고)',query:'생성형 AI 서비스를 제공하는 경우, 허용되는 이용방침(AUP)을 공개하고 있습니까?',guide:'딥페이크 성범죄·신원 도용 등 오용 유형 식별. 제공자의 AUP 검토하여 데이터 보존·제3자 제공 조건 사전 확인.',evidence:['AUP 내용 및 게시 수단']},
  {code:'AI-07',cat:'이용',name:'국외 이전 적법 요건',risk:'mid',law:'개인정보보호법 제28조의8',query:'AI 서비스 이용 시 개인정보가 국외 서버로 이전되는 경우, 적법한 국외 이전 근거가 확보되어 있습니까?',guide:'AI API 서버 소재지 확인. CDN·클라우드 리전 등 간접 이전 경로 포함 검토. 표준 계약 체결 또는 정보주체 동의.',evidence:['(필요시) 정보주체 동의','처리방침 국외 이전 항목 화면']},
  {code:'AI-08',cat:'보관·파기',name:'AI 학습 데이터 보관·파기 정책',risk:'mid',law:'개인정보보호법 제21조',query:'AI 학습 데이터의 보유기간을 정하고, 보유기간 경과 시 지체 없이 파기하도록 계획하고 있습니까?',guide:'AI 학습 종료 시점 기준 보유기간 설정. 보유기간 종료 후 5영업일 이내 파기. 법령 의무 보관 시 분리 보관.',evidence:['학습 데이터 보관 정책','학습 데이터 파기 로직']},
  {code:'AI-09',cat:'운영관리',name:'개인정보 처리방침 공개',risk:'high',law:'개인정보보호법 제30조',query:'AI 시스템에서 처리하는 개인정보 현황(처리 항목·목적·보존기간)이 처리방침에 공개되어 있습니까?',guide:'자동화 처리·프로파일링·AI 학습 활용 여부 포함. AI 서비스 변경 시 즉시 업데이트. 위탁 현황(AI 제공자 포함) 공개.',evidence:['처리방침 AI 관련 항목 화면']},
  {code:'AI-10',cat:'운영관리',name:'AI 생성 콘텐츠 식별 조치',risk:'high',law:'인공지능기본법 제31조 제2항',query:'생성형 AI 결과물에 대해 이용자가 가상정보임을 인지할 수 있도록 식별 조치(워터마크 등)를 적용하고 있습니까?',guide:'이미지·영상·텍스트에 AI 생성물 표시(워터마크·문구). 메타데이터에 AI 생성 정보(Origin) 포함.',evidence:['AI 결과물 식별 표시 예시','워터마크 적용 기술 명세']},
  {code:'AI-11',cat:'운영관리',name:'정보주체 권리보장',risk:'high',law:'개인정보보호법 제35조~제38조',query:'AI 출력물 내 개인정보 유·노출 또는 부적절한 콘텐츠에 대한 신고·삭제 처리 체계를 갖추고 있습니까?',guide:'이용자 신고 채널(CS, 앱 내) 운영. 신고 접수 후 처리 절차(검토→삭제→통지) 문서화.',evidence:['서비스 내 신고 기능','권리보장 프로세스']},
  {code:'AI-12',cat:'운영관리',name:'고영향 AI 해당 여부 검토',risk:'high',law:'인공지능기본법 제33조·제34조',query:'운영 중인 AI 시스템이 인공지능기본법상 고영향 인공지능에 해당하는지 정기적으로 검토하고 있습니까?',guide:'과기정통부 고영향 AI 지정 기준 및 고시 변경사항 주기적 확인. 금융·의료·교육 등 기본권 영향 내부 검토.',evidence:['고영향 AI 검토 결과서','사업자 준수사항 이행 현황']},
  {code:'AI-13',cat:'권한관리',name:'접근 권한 관리',risk:'high',law:'개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제5조',query:'AI 모델, 학습 데이터, 연계 데이터(RAG)에 대한 접근권한을 최소한으로 부여·관리하고 있습니까?',guide:'RBAC 기반 최소 권한. RAG 구조 운영 시 벡터 임베딩도 원본 재현 가능성 고려. 퇴사·직무 변경 시 즉시 회수.',evidence:['접근 권한 리스트(학습DB·벡터DB·모델 콘솔)','부여·변경·말소 이력(승인 포함)']},
  {code:'AI-14',cat:'접근통제',name:'접근 통제',risk:'high',law:'개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제6조',query:'AI 모델, 학습 데이터 및 연계 시스템에 대한 기술적·환경적 접근 통제를 적용하고 있습니까?',guide:'네트워크 접근 제한(사내망·VPN). 시간·위치·단말 조건 등 추가 통제 수단 고려. 학습 데이터 강화된 접근 통제.',evidence:['IP 접근 통제 내역(방화벽·보안그룹·IP Allowlist)']},
  {code:'AI-15',cat:'접근통제',name:'API 인증정보 관리',risk:'high',law:'개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제5조·제6조',query:'외부 AI API 호출을 위한 인증 정보(API Key, Token)를 안전하게 발급·보관·갱신하고 있습니까?',guide:'소스코드 하드 코딩 금지. Secret Manager·환경 변수로 관리. 서비스 계정 단위 발급. 주기적 변경·재발급 체계.',evidence:['API Key 관리 정책','Secret Manager 화면','API Key 변경·로테이션 설정']},
  {code:'AI-16',cat:'암호화',name:'전송구간 암호화',risk:'high',law:'개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제7조',query:'AI 서비스와의 API 통신 구간에 암호화(TLS 1.2 이상)가 적용되어 있습니까?',guide:'외부 AI API 통신 구간에 개인정보·민감정보가 평문 노출되지 않도록 TLS 1.2 이상 적용.',evidence:['TLS 버전 확인 결과']},
  {code:'AI-17',cat:'로그관리',name:'로그 수집 및 정기 점검',risk:'high',law:'인공지능기본법 제32조·개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제8조',query:'API 호출, 입력/출력 결과를 로그로 기록하고, 정기적으로 점검하여 이상 여부를 검토하고 있습니까?',guide:'API 호출·입출력·접속 로그 수집. 로그 내 불필요한 개인정보 제거. 비정상 호출·대량 요청·업무 시간외 접근 탐지.',evidence:['로그(접속기록·API 호출 로그)','정기 모니터링 계획 및 점검 이력']},
  {code:'AI-18',cat:'보안패치',name:'보안 패치·업데이트 관리',risk:'mid',law:'개인정보보호법 제29조·개인정보 안전성 확보조치 기준 제9조',query:'이용 중인 AI 서비스(API, 오픈소스 라이브러리)의 보안 취약점 및 업데이트 현황을 주기적으로 점검하고 있습니까?',guide:'AI 서비스 제공자 보안 공지·패치 이력 정기 확인. LangChain·Hugging Face 등 오픈소스 의존성 취약점 포함.',evidence:['보안 공지 확인 이력','업데이트 적용 기록','취약점 조치 이력']},
  {code:'AI-19',cat:'취약점점검',name:'AI 취약점 점검',risk:'mid',law:'인공지능기본법 제32조·개인정보보호법 제29조',query:'AI 취약점 공격에 의한 개인정보 유·노출 위험을 최소화하기 위한 대책을 계획하고 있습니까?',guide:'AI 시스템 유형·구성방식 고려하여 취약점 위험 식별. OWASP LLM Top 10 참고. Prompt Injection 등 LLM 특화 공격 대응.',evidence:['취약점 점검 이력']},
];

let clFilter={search:'',cat:'',risk:''};
function filterCL(){
  clFilter.search=document.getElementById('clSearch').value.toLowerCase();
  clFilter.cat=document.getElementById('clCat').value;
  clFilter.risk=document.getElementById('clRisk').value;
  renderCL();
}
function renderCL(){
  const f=CL.filter(d=>{
    const ms=!clFilter.search||(d.name+d.cat+d.law+d.query+d.code).toLowerCase().includes(clFilter.search);
    const mc=!clFilter.cat||d.cat===clFilter.cat;
    const mr=!clFilter.risk||d.risk===clFilter.risk;
    return ms&&mc&&mr;
  });
  document.getElementById('clCount').textContent=f.length+'개 항목';
  const tb=document.getElementById('clBody');
  if(!tb)return;
  tb.innerHTML='';
  f.forEach(d=>{
    const rb=d.risk==='high'?'badge-red':'badge-amber';
    const rl=d.risk==='high'?'높음':'중간';
    const tr=document.createElement('tr');
    tr.className='xl-row';
    tr.innerHTML=`<td class="xl-code">${d.code}</td><td><span class="badge ${d.risk==='high'?'badge-teal':'badge-blue'}">${d.cat}</span></td><td class="xl-name">${d.name}</td><td><span class="badge ${rb}">${rl}</span></td><td class="xl-law">${d.law}</td><td><span class="xl-exp">▶</span></td>`;
    const dr=document.createElement('tr');
    dr.className='xl-detail-row';
    dr.innerHTML=`<td colspan="6"><div class="xl-detail-inner"><div class="xl-detail-block"><h5>질의문</h5><p>${d.query}</p></div><div class="xl-detail-block"><h5>점검 가이드</h5><p>${d.guide}</p></div><div class="xl-detail-block"><h5>필요 증빙</h5><ul>${d.evidence.map(e=>`<li>${e}</li>`).join('')}</ul></div></div></td>`;
    tr.onclick=()=>{
      const o=dr.classList.contains('open');
      document.querySelectorAll('.xl-detail-row').forEach(x=>x.classList.remove('open'));
      document.querySelectorAll('.xl-row').forEach(x=>x.classList.remove('expanded'));
      if(!o){dr.classList.add('open');tr.classList.add('expanded')}
    };
    tb.appendChild(tr);tb.appendChild(dr);
  });
}
renderCL();
</script>
