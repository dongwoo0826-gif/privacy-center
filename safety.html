    checks:['개인정보 출력·복사 시 승인 절차가 이행되고 있는가','출력·복사 범위가 업무 필요에 따라 최소화되고 있는가','출력된 개인정보에 대한 사후 처리가 이루어지고 있는가','출력·복사 이력이 기록되고 있는가'],
    evidence:['개인정보 출력·복사 승인 기록','출력·복사 이력 로그','출력된 개인정보 파기·반납 확인 기록'],
    example:null,
    tip:'개인정보 출력 통제 정책이 있어도 출력 이력 로그가 없으면 사후 검증이 불가능합니다. 복합기(MFP) 로그를 수집·보관하는 체계를 함께 구축하세요. 시스템 화면에서 마스킹 처리된 정보만 표시하고 출력 시에만 마스킹 해제 승인을 요구하는 방식도 효과적입니다.'

  {

    title:'출력된 개인정보 보호 및 파기',
    basis:'제12조 개인정보의 출력·복사시 보호조치',
    overview:'개인정보처리자는 출력·복사된 개인정보를 업무 목적 달성 후 즉시 파기하거나 안전하게 보관하여야 하며, 방치·무단 반출되지 않도록 관리해야 한다.',
    risk:null,
    mustDo:['출력된 개인정보를 업무 완료 후 즉시 파기(파쇄 또는 소각)','출력된 개인정보를 사용 전까지 잠금장치가 있는 곳에 보관','출력된 개인정보의 무단 방치 또는 외부 반출 금지','프린터·복사기 주변에 방치된 출력물 점검 절차 수립'],
    checks:['출력된 개인정보가 업무 완료 후 즉시 파기되고 있는가','사용 전 출력물이 안전하게 보관되고 있는가','프린터·복사기 주변에 방치된 개인정보 출력물이 없는가','출력물 파기 이력이 기록되고 있는가'],
    evidence:['출력물 파기 기록','출력물 관리 절차 문서','프린터·복사기 주변 점검 기록'],
    example:null,
    tip:'프린터 앞에 출력된 문서가 방치되는 \'프린터 취약점\'은 가장 흔한 물리적 보안 사고 원인 중 하나입니다. \'Follow-me Printing\'(사용자가 프린터 앞에서 직접 인증 후 출력) 방식을 도입하면 이 문제를 근본적으로 해결할 수 있습니다.'
  }
];

/* ══ 넘버링 매핑 ══ */
const SF_MAJOR = [
  { key:'관리적', label:'1. 관리적 보호조치', badge:'badge-amber' },
  { key:'기술적', label:'2. 기술적 보호조치', badge:'badge-blue' },
  { key:'물리적', label:'3. 물리적 보호조치', badge:'badge-red'  }
];

const SF_CAT_MAP = {
  '관리적': [
    { cat:'내부 관리계획의 수립·시행', num:'1.1' },
    { cat:'개인정보의 파기',           num:'1.2' }
  ],
  '기술적': [
    { cat:'접근 권한의 관리',        num:'2.1' },
    { cat:'접근통제',                num:'2.2' },
    { cat:'인터넷망 차단 조치',      num:'2.3' },
    { cat:'개인정보의 암호화',       num:'2.4' },
    { cat:'접속기록의 보관 및 점검', num:'2.5' },
    { cat:'악성프로그램 등 방지',    num:'2.6' }
  ],
  '물리적': [
    { cat:'물리적 안전조치',                 num:'3.1' },
    { cat:'재해·재난 대비 안전조치',         num:'3.2' },
    { cat:'개인정보의 출력·복사시 보호조치', num:'3.3' }
  ]
};

const SF_ITEM_NUM = {
  'safety-401':'1.1.1','safety-402':'1.1.2','safety-403':'1.1.3','safety-404':'1.1.4',
  'safety-1301':'1.2.1','safety-1302':'1.2.2','safety-1303':'1.2.3',
  'safety-501':'2.1.1','safety-502':'2.1.2','safety-503':'2.1.3',
  'safety-504':'2.1.4','safety-505':'2.1.5','safety-506':'2.1.6',
  'safety-601':'2.2.1','safety-602':'2.2.2','safety-603':'2.2.3',
  'safety-604':'2.2.4','safety-605':'2.2.5',
  'safety-6201':'2.3.1','safety-6202':'2.3.2',
  'safety-701':'2.4.1','safety-702':'2.4.2','safety-703':'2.4.3',
  'safety-704':'2.4.4','safety-705':'2.4.5','safety-706':'2.4.6',
  'safety-801':'2.5.1','safety-802':'2.5.2','safety-803':'2.5.3',
  'safety-901':'2.6.1','safety-902':'2.6.2',
  'safety-1001':'3.1.1','safety-1002':'3.1.2','safety-1003':'3.1.3',
  'safety-1101':'3.2.1','safety-1102':'3.2.2',
  'safety-1201':'3.3.1','safety-1202':'3.3.2'
};

/* ══ 상태 & 필터 ══ */
let sfCurrent = null;
let sfFiltered = safetyData.slice();

// [초기 상태 변경] 페이지 최초 로드 시 '관리적 보호조치'는 접힘 상태로 시작
const sfOpenMajor = new Set([]);
const sfOpenSub   = new Set(['1.1','1.2']);

/* ══ TOC 빌드 ══ */
function sfBuildToc(data) {
  const toc = document.getElementById('sfToc');
  if (!toc) return;

  // 검색된 데이터를 group → cat 별로 분류
  const filtered = {};
  data.forEach(d => {
    if (!filtered[d.group]) filtered[d.group] = {};
    if (!filtered[d.group][d.cat]) filtered[d.group][d.cat] = [];
    filtered[d.group][d.cat].push(d);
  });

  const isSearching = data.length < safetyData.length;
  let html = '';

  SF_MAJOR.forEach(({ key: grp, label: majorLabel }) => {
    const grpData = filtered[grp];
    if (!grpData) return;

    const majorOpen = isSearching || sfOpenMajor.has(grp);
    html += `<div class="g-cat-hdr${majorOpen ? ' open' : ''}" data-major="${grp}" onclick="sfToggleMajor(this)">` +
            `<span class="g-cat-label">${majorLabel}</span>` +
            `<span class="g-cat-arrow">${majorOpen ? '▼' : '▶'}</span></div>` +
            `<div class="g-items-wrap${majorOpen ? ' open' : ''}">`;

    (SF_CAT_MAP[grp] || []).forEach(({ cat, num: catNum }) => {
      if (!grpData[cat]) return;
      const subOpen = isSearching || sfOpenSub.has(catNum);
      html += `<div class="g-subcat-hdr${subOpen ? ' open' : ''}" data-sub="${catNum}" onclick="sfToggleSub(this)">` +
              `<span>${catNum}&nbsp;&nbsp;${cat}</span>` +
              `<span class="g-cat-arrow" style="font-size:7px">${subOpen ? '▼' : '▶'}</span></div>` +
              `<div class="g-items-wrap${subOpen ? ' open' : ''}">`;

      grpData[cat].forEach(item => {
        const num = SF_ITEM_NUM[item.id] || item.law;
        html += `<div class="g-item sf-leaf${sfCurrent === item.id ? ' active' : ''}" ` +
                `data-id="${item.id}" onclick="sfSelect('${item.id}')">` +
                `<span class="g-item-code">${num}</span>` +
                `<span class="g-item-name">${item.title}</span></div>`;
      });
      html += '</div>'; // close sub items-wrap
    });
    html += '</div>'; // close major items-wrap
  });
  toc.innerHTML = html;
}

function sfToggleMajor(el) {
  const grp  = el.dataset.major;
  const wrap = el.nextElementSibling;
  const arrow = el.querySelector('.g-cat-arrow');
  const nowOpen = wrap.classList.toggle('open');
  el.classList.toggle('open', nowOpen);
  if (arrow) arrow.textContent = nowOpen ? '▼' : '▶';
  if (nowOpen) sfOpenMajor.add(grp); else sfOpenMajor.delete(grp);
}

function sfToggleSub(el) {
  const sub  = el.dataset.sub;
  const wrap = el.nextElementSibling;
  const arrow = el.querySelector('.g-cat-arrow');
  const nowOpen = wrap.classList.toggle('open');
  el.classList.toggle('open', nowOpen);
  if (arrow) arrow.textContent = nowOpen ? '▼' : '▶';
  if (nowOpen) sfOpenSub.add(sub); else sfOpenSub.delete(sub);
}

/* ══ 검색 ══ */
function sfFilter() {
  const q = (document.getElementById('sfSearch')?.value || '').toLowerCase().trim();
  sfFiltered = q
    ? safetyData.filter(d => d.title.includes(q) || d.cat.includes(q) || d.law.includes(q) || d.group.includes(q))
    : safetyData.slice();
  sfBuildToc(sfFiltered);
  if (sfCurrent) {
    const el = document.querySelector(`.g-item[data-id="${sfCurrent}"]`);
    if (el) el.classList.add('active');
  }
}

/* ══ 항목 선택 & 렌더 ══ */
function sfSelect(id) {
  sfCurrent = id;
  // 개요 항목 active 해제
  const ov = document.getElementById('sf-overview-item');
  if (ov) ov.classList.remove('active');
  // 선택 항목의 대분류·중분류 자동 열기
  const hit = safetyData.find(d => d.id === id);
  if (hit) {
    sfOpenMajor.add(hit.group);
    const num = SF_ITEM_NUM[id];
    if (num) sfOpenSub.add(num.split('.').slice(0, 2).join('.'));
  }
  sfBuildToc(sfFiltered);
  const content = document.getElementById('sfContent');
  if (!content || !hit) return;
  content.innerHTML = sfRender(hit);
  content.scrollTop = 0;
}

function sfRender(item) {
  const majorObj = SF_MAJOR.find(m => m.key === item.group) || {};
  const badgeCls = majorObj.badge || 'badge-blue';
  const majorLabel = majorObj.label || item.group;
  // 중분류 번호 찾기
  const catEntry = (SF_CAT_MAP[item.group] || []).find(c => c.cat === item.cat);
  const catNum   = catEntry ? catEntry.num : '';
  const itemNum  = SF_ITEM_NUM[item.id] || '';
  const catDisplay = catNum ? `${catNum} ${item.cat}` : item.cat;
  let html = `
<div class="gc-cat">${majorLabel} &middot; ${catDisplay}</div>
<div class="gc-title">${itemNum ? `<span style="color:var(--text3);font-family:var(--mono);font-size:.85em;font-weight:400;margin-right:.4em">${itemNum}</span>` : ''}${item.title}</div>
<div style="margin-bottom:1rem">
  <span class="badge ${badgeCls}">${item.basis}</span>
</div>`;

  /* OVERVIEW */
  html += `<div class="gc-section">
  <div class="gc-section-title">OVERVIEW</div>
  <div class="gc-desc">${item.overview}</div>
</div>`;

  /* 경고 박스 */
  if (item.risk) {
    html += `<div class="gc-alert warn" style="margin-bottom:1.25rem">⚠️ ${item.risk}</div>`;
  }

  /* 주요 의무사항 */
  html += `<div class="gc-section">
  <div class="gc-section-title">주요 의무사항</div>
  <div class="gc-checks">
    ${item.mustDo.map(m => `<div class="gc-check">${m}</div>`).join('')}
  </div>
</div>`;

  /* 주요 확인사항 */
  html += `<div class="gc-section">
  <div class="gc-section-title">주요 확인사항</div>
  <div class="gc-checks">
    ${item.checks.map((c,i) => `<div class="gc-check" style="background:var(--bg2)"><span style="color:var(--accent);font-family:var(--mono);font-size:11px;min-width:18px;flex-shrink:0">${i+1}</span>${c}</div>`).join('')}
  </div>
</div>`;

  /* 증거자료 */
  html += `<div class="gc-section">
  <div class="gc-section-title">증거자료</div>
  <div class="gc-evidence">
    ${item.evidence.map(e => `<span class="gc-ev">📄 ${e}</span>`).join('')}
  </div>
</div>`;

  /* 적용 예시 */
  if (item.example) {
    html += `<div class="gc-section">
  <div class="gc-section-title">적용 예시</div>
  <div class="gc-example">${item.example}</div>
</div>`;
  }

  /* 실무 TIP */
  if (item.tip) {
    html += `<div style="margin-top:1.5rem;padding:14px 16px;background:rgba(37,99,235,0.05);border-left:3px solid var(--accent);border-radius:var(--r)">
  <div style="font-size:10px;color:var(--accent);font-family:var(--mono);letter-spacing:.08em;margin-bottom:6px">AI 보완 내용 · 참고용</div>
  <div style="font-size:12.5px;color:var(--text2);line-height:1.85">💡 ${item.tip}</div>
</div>`;
  }

  /* 이전/다음 nav */
  const idx = sfFiltered.findIndex(d => d.id === item.id);
  const prev = idx > 0 ? sfFiltered[idx-1] : null;
  const next = idx < sfFiltered.length-1 ? sfFiltered[idx+1] : null;
  html += `<div class="gc-nav">
  ${prev ? `<button class="gc-nav-btn" onclick="sfSelect('${prev.id}')">← ${SF_ITEM_NUM[prev.id]||prev.law} ${prev.title}</button>` : '<span></span>'}
  ${next ? `<button class="gc-nav-btn" onclick="sfSelect('${next.id}')">${SF_ITEM_NUM[next.id]||next.law} ${next.title} →</button>` : '<span></span>'}
</div>`;

  return html;
}

/* ══ 개요 표시 함수 ══ */
function sfShowOverview() {
  sfCurrent = null;
  // 데이터 항목 active 해제
  document.querySelectorAll('#sfToc .g-item').forEach(el => el.classList.remove('active'));
  // 개요 항목 active 표시
  const ov = document.getElementById('sf-overview-item');
  if (ov) ov.classList.add('active');
  // 개요 콘텐츠 렌더링
  const tpl = document.getElementById('sf-overview-tpl');
  const content = document.getElementById('sfContent');
  if (content && tpl) { content.innerHTML = tpl.innerHTML; content.scrollTop = 0; }
  sfBuildToc(sfFiltered);
}

/* ══ 전역 노출 (onclick 속성에서 호출 가능하도록) ══ */
window.sfSelect      = sfSelect;
window.sfShowOverview = sfShowOverview;
window.sfToggleMajor = sfToggleMajor;
window.sfToggleSub   = sfToggleSub;
window.sfFilter      = sfFilter;

/* ══ 초기화: 개요를 기본으로 표시 ══ */
sfBuildToc(safetyData);
setTimeout(() => sfShowOverview(), 60);

})();
</script>
